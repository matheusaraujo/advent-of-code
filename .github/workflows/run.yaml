name: run

on:
  push:

env:
  PYTHON_VERSION: "3.9"
  NODE_VERSION: "20.10"
  DOTNET_VERSION: "8.0"
  JAVA_VERSION: "21.0"
  GO_VERSION: "1.21"

jobs:
  load-puzzle:
    name: Load Puzzle
    runs-on: ubuntu-latest
    env:
      AOC_SESSION: ${{ secrets.AOC_SESSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Load Puzzle
        run: |
          make prepare-py
          make load-puzzle year=2015 day=01
      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: data
          path: data

  run-c:
    name: Run C
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - name: Run C
        run: |
          make run year=2015 day=01 lang=c

  run-cpp:
    name: Run C++
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - name: Run C++
        run: |
          make run year=2015 day=01 lang=cpp

  run-csharp:
    name: Run CSharp
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run CSharp
        run: |
          make prepare-csharp
          make run year=2015 day=01 lang=csharp

  run-go:
    name: Run Go
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run Go
        run: |
          make run year=2015 day=01 lang=go

  run-java:
    name: Run Java
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run Java
        run: |
          make run year=2015 day=01 lang=java

  run-js:
    name: Run JS
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run JavaScript
        run: |
          make run year=2015 day=01 lang=js

  run-python:
    name: Run Python
    runs-on: ubuntu-latest
    needs: load-puzzle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run Python
        run: |
          make run year=2015 day=01 lang=python

  delete-data-files:
    name: Clean up
    runs-on: ubuntu-latest
    needs: [run-c, run-cpp, run-csharp, run-go, run-java, run-js, run-python]
    if: always()
    steps:
      - uses: geekyeggo/delete-artifact@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: data
